<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX AI</title>

<!-- Modern Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">

<style>
/* ==================== GLOBAL VARIABLES & THEMING ==================== */
:root {
  --bg-main: #0a0a0c;
  --bg-gradient: radial-gradient(circle at 50% 0%, #1a1a24 0%, #0a0a0c 60%);
  --header-bg: rgba(10, 10, 12, 0.8);
  --header-border: rgba(255, 255, 255, 0.05);
  --text-primary: #ffffff;
  --text-secondary: #9ca3af;
  --input-bg: rgba(30, 30, 35, 0.7);
  --input-border: rgba(255, 255, 255, 0.1);
  --input-focus: rgba(255, 255, 255, 0.2);
  --msg-user: rgba(255, 255, 255, 0.05);
  --msg-ai: transparent;
  --dropdown-bg: #1f1f23;
  --dropdown-hover: rgba(255, 255, 255, 0.05);
  --shadow-color: rgba(0, 0, 0, 0.5);
  --accent-color: #ff003c;
}

.light-theme {
  --bg-main: #ffffff;
  --bg-gradient: radial-gradient(circle at 50% 0%, #f3f4f6 0%, #ffffff 60%);
  --header-bg: rgba(255, 255, 255, 0.8);
  --header-border: rgba(0, 0, 0, 0.05);
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --input-bg: rgba(243, 244, 246, 0.8);
  --input-border: rgba(0, 0, 0, 0.05);
  --input-focus: rgba(0, 0, 0, 0.15);
  --msg-user: #f3f4f6;
  --msg-ai: transparent;
  --dropdown-bg: #ffffff;
  --dropdown-hover: #f3f4f6;
  --shadow-color: rgba(0, 0, 0, 0.05);
  --accent-color: #d90032;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg-main); 
  background-image: var(--bg-gradient);
  color: var(--text-primary);
  height: 100vh; height: 100dvh;
  display: flex; overflow: hidden;
  transition: background 0.4s ease, color 0.4s ease;
}

.icon { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
button { background: none; border: none; color: inherit; cursor: pointer; font-family: inherit; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--header-border); border-radius: 10px; }

/* ==================== SIDEBAR ==================== */
.sidebar {
  width: 280px; background: var(--bg-main); border-right: 1px solid var(--header-border);
  display: flex; flex-direction: column; transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: absolute; height: 100%; z-index: 20;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--header-border); }
.sidebar-content { padding: 20px; flex: 1; overflow-y: auto; color: var(--text-secondary); font-size: 14px; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.active { opacity: 1; pointer-events: all; }

/* ==================== MAIN VIEW ==================== */
.main-view { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }

/* HEADER */
header {
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--header-border); z-index: 10;
}
.left-section, .right-section { width: 60px; display: flex; align-items: center; }
.right-section { justify-content: flex-end; position: relative; }
.icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; color: var(--text-secondary); }
.icon-btn:hover { background: var(--header-border); color: var(--text-primary); }
.app-title { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }

/* PROFILE DROPDOWN */
.profile-menu {
  position: absolute; top: 50px; right: 0; background: var(--dropdown-bg);
  border: 1px solid var(--header-border); border-radius: 12px; width: 240px;
  padding: 8px; box-shadow: 0 10px 30px var(--shadow-color);
  opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.2s ease;
}
.profile-menu.show { opacity: 1; pointer-events: all; transform: translateY(0); }
.menu-item {
  display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; border-radius: 8px;
  font-size: 14px; font-weight: 500; color: var(--text-primary); text-align: left; transition: background 0.2s;
}
.menu-item:hover { background: var(--dropdown-hover); }
.menu-divider { height: 1px; background: var(--header-border); margin: 8px 0; }

/* CHAT AREA */
.chat-area { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
.hero-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; margin: auto; animation: fadeIn 0.8s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.hero-section h2 { font-family: 'Outfit', sans-serif; font-size: 30px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; }

/* MESSAGES */
.msg-row { display: flex; gap: 16px; max-width: 85%; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
@keyframes popIn { to { opacity: 1; transform: translateY(0); } }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.ai { align-self: flex-start; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.msg-row.user .avatar { background: var(--input-bg); color: var(--text-primary); }
.msg-row.ai .avatar { background: var(--text-primary); color: var(--bg-main); }
.bubble { padding: 16px 20px; font-size: 15px; line-height: 1.6; border-radius: 18px; }
.msg-row.user .bubble { background: var(--msg-user); border-top-right-radius: 4px; }
.msg-row.ai .bubble { background: var(--msg-ai); padding: 10px 0; }

/* TYPING INDICATOR */
.typing-indicator { display: flex; gap: 6px; padding: 10px 0; }
.dot { width: 8px; height: 8px; background: var(--text-secondary); border-radius: 50%; animation: typeBounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes typeBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

/* INPUT AREA */
.input-container { padding: 0 15% 30px 15%; background: linear-gradient(to top, var(--bg-main) 60%, transparent); }
.input-wrapper { position: relative; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 24px; display: flex; align-items: flex-end; padding: 10px 16px; transition: all 0.3s; }
.input-wrapper:focus-within { border-color: var(--input-focus); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
.chat-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: inherit; font-size: 16px; outline: none; resize: none; max-height: 150px; min-height: 24px; padding: 12px 12px 12px 4px; line-height: 1.5; }
.chat-input::placeholder { color: var(--text-secondary); }
.send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--text-primary); color: var(--bg-main); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s; margin-bottom: 2px; }
.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: scale(1); }
.send-btn svg { width: 18px; height: 18px; fill: currentColor; stroke: none; }

/* TOAST */
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 24px; background: #0f172a; color: #fff; border-radius: 10px; z-index: 10000; display: none; font-size: 14px; font-weight: 600; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }

@media (max-width: 768px) {
  .chat-area { padding-left: 20px; padding-right: 20px; }
  .input-container { padding: 0 20px 20px 20px; }
  .msg-row { max-width: 95%; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span style="font-weight: 600;">Cloud Memory ☁️</span>
    <button class="icon-btn" onclick="toggleSidebar()"><svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
  </div>
  <div class="sidebar-content" id="sidebar-history-content">
    <p style="opacity: 0.6; text-align: center; margin-top: 20px;">Sign in with Google to save & sync your chat history.</p>
    <button onclick="window.loginWithGoogle()" style="margin-top: 20px; padding: 12px; width: 100%; background: white; color: black; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;">
        Sign in with Google
    </button>
  </div>
</div>

<div class="main-view">
  <!-- HEADER -->
  <header>
    <div class="left-section">
      <button class="icon-btn" onclick="toggleSidebar()"><svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="app-title">VX</div>
    
    <div class="right-section">
      <button class="icon-btn" onclick="toggleProfileMenu(event)">
        <img id="nav-profile-pic" src="" style="width: 32px; height: 32px; border-radius: 50%; display: none; object-fit: cover;">
        <svg id="nav-profile-icon" class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </button>
      
      <!-- DROPDOWN -->
      <div class="profile-menu" id="profileMenu">
        <!-- Guest View -->
        <div id="menu-guest">
            <button class="menu-item" onclick="window.loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;"> Sign in with Google
            </button>
        </div>
        <!-- Logged In View -->
        <div id="menu-user" style="display: none;">
            <div style="padding: 12px 16px; margin-bottom: 8px;">
                <strong id="p-name" style="color: var(--text-primary);">Name</strong><br>
                <small id="p-email" style="color: var(--text-secondary);">Email</small>
            </div>
            <div class="menu-divider"></div>
            <button class="menu-item" onclick="window.logout()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout Account
            </button>
        </div>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="toggleTheme()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Switch Theme
        </button>
        <button class="menu-item"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Privacy Policy</button>
      </div>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="hero-section" id="welcomeBlock">
      <h2>How can I help you?</h2>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-container">
    <div class="input-wrapper">
      <textarea class="chat-input" id="chatInput" placeholder="Chat with VX..." rows="1" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="window.triggerSend()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path></svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ==================== UI SCRIPT ==================== -->
<script>
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
  function toggleProfileMenu(e) { e.stopPropagation(); document.getElementById('profileMenu').classList.toggle('show'); }
  document.addEventListener('click', (e) => { const menu = document.getElementById('profileMenu'); if (menu.classList.contains('show') && !e.target.closest('.right-section')) menu.classList.remove('show'); });
  function toggleTheme() { document.body.classList.toggle('light-theme'); document.getElementById('profileMenu').classList.remove('show'); }
  function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatMarkdown(text) { let f = esc(text); f = f.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); return f.replace(/\n/g, '<br>'); }
  
  function showToast(msg, color="#10b981") {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.borderLeft = `4px solid ${color}`;
    t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
  }

  function scrollBottom() { const chatArea = document.getElementById('chatArea'); chatArea.scrollTop = chatArea.scrollHeight; }

  // Shared UI Add Message (Database se sync)
  window.renderUIMessage = function(role, text) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div'); div.className = `msg-row ${role}`;
    div.innerHTML = `<div class="avatar">${role === 'user' ? 'U' : 'V'}</div>
                     <div class="bubble">${role === 'ai' ? formatMarkdown(text) : esc(text).replace(/\n/g,'<br>')}</div>`;
    chatArea.appendChild(div);
    scrollBottom();
  }

  function addTyping() {
    const id = 'typ_' + Date.now(); const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div'); div.className = 'msg-row ai'; div.id = id;
    div.innerHTML = `<div class="avatar">V</div><div class="bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    chatArea.appendChild(div); scrollBottom(); return id;
  }
</script>

<!-- ==================== FIREBASE CLOUD SCRIPT ==================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  // Existing working Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyB7FO4QoPGQPPaIUQNVOFNE3jwYrfPst08",
    authDomain: "vx-ai-8bdf5.firebaseapp.com",
    projectId: "vx-ai-8bdf5",
    storageBucket: "vx-ai-8bdf5.firebasestorage.app",
    messagingSenderId: "950189759329",
    appId: "1:950189759329:web:aa694cfb162f2126618320"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = "vx-ai-v2"; 

  let currentUser = null;
  let isGuest = true;
  let loadedMessageIds = new Set();
  let isFirstLoad = true;
  let unsubscribeHistory = null;

  // RULE 3: Auth Before Queries (Fallback to Anonymous first)
  const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { console.error(e); } };
  initAuth();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      isGuest = user.isAnonymous;
      updateProfileUI();
      if (!isGuest) {
        syncCloudHistory(); // Start syncing if real user
      }
    } else {
      currentUser = null;
    }
  });

  function updateProfileUI() {
    const menuGuest = document.getElementById('menu-guest');
    const menuUser = document.getElementById('menu-user');
    const pic = document.getElementById('nav-profile-pic');
    const icon = document.getElementById('nav-profile-icon');

    if (isGuest) {
      menuGuest.style.display = 'block'; menuUser.style.display = 'none';
      pic.style.display = 'none'; icon.style.display = 'block';
    } else {
      menuGuest.style.display = 'none'; menuUser.style.display = 'block';
      document.getElementById('p-name').textContent = currentUser.displayName || "User";
      document.getElementById('p-email').textContent = currentUser.email;
      if (currentUser.photoURL) {
        pic.src = currentUser.photoURL; pic.style.display = 'block'; icon.style.display = 'none';
      }
    }
  }

  // Google Login Trigger
  window.loginWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    try {
      showToast("Opening Google Login...", "#3b82f6");
      await signInWithPopup(auth, provider);
      showToast("Welcome to VX AI!", "#10b981");
      document.getElementById('profileMenu').classList.remove('show');
    } catch (e) { showToast("Login Canceled", "#ef4444"); }
  };

  window.logout = async () => {
    if (unsubscribeHistory) unsubscribeHistory();
    await signOut(auth);
    await signInAnonymously(auth); // Revert to guest mode
    document.getElementById('profileMenu').classList.remove('show');
    
    // Reset UI completely
    document.getElementById('chatArea').innerHTML = `<div class="hero-section" id="welcomeBlock"><h2>How can I help you?</h2></div>`;
    loadedMessageIds.clear(); isFirstLoad = true;
    document.getElementById('sidebar-history-content').innerHTML = `
        <p style="opacity: 0.6; text-align: center; margin-top: 20px;">Sign in with Google to save & sync your chat history.</p>
        <button onclick="window.loginWithGoogle()" style="margin-top: 20px; padding: 12px; width: 100%; background: white; color: black; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;"> Sign in with Google
        </button>`;
    showToast("Logged out securely.", "#ef4444");
  };

  // RULE 1 & 2: Safe fetching & Sorting in Memory
  function syncCloudHistory() {
    const msgRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'messages');
    
    unsubscribeHistory = onSnapshot(msgRef, (snapshot) => {
      let msgs = [];
      snapshot.forEach(doc => msgs.push({id: doc.id, ...doc.data()}));
      msgs.sort((a, b) => a.timestamp - b.timestamp); // Sort by Time in JS

      if (isFirstLoad) {
        const wb = document.getElementById('welcomeBlock'); if(wb) wb.remove();
        msgs.forEach(msg => {
          if (!loadedMessageIds.has(msg.id)) {
            window.renderUIMessage(msg.role, msg.content);
            loadedMessageIds.add(msg.id);
          }
        });
        isFirstLoad = false;
      } else {
        // Just sync new ones that come from other devices
        msgs.forEach(msg => {
          if (!loadedMessageIds.has(msg.id)) {
            window.renderUIMessage(msg.role, msg.content);
            loadedMessageIds.add(msg.id);
          }
        });
      }

      // Update Sidebar UI
      document.getElementById('sidebar-history-content').innerHTML = `
        <div style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--header-border); border-radius: 12px; margin-bottom: 10px;">
            <strong style="color: var(--text-primary)">${currentUser.displayName}</strong><br>
            <small style="color: var(--text-secondary)">${currentUser.email}</small>
        </div>
        <p style="color: #10b981; font-weight: 600; font-size: 13px; text-align: center; margin: 20px 0;">✓ Cloud Memory Synced (${msgs.length} msgs)</p>
        <button onclick="window.clearCloudHistory()" style="margin-top: 10px; padding: 12px; width: 100%; background: rgba(255,0,60,0.1); color: var(--accent-color); border: 1px solid rgba(255,0,60,0.3); border-radius: 8px; font-weight: 600; transition: 0.2s;">
            Clear All History
        </button>
      `;
    }, (error) => { console.error("Cloud Error", error); });
  }

  // Clear History Rule Compliance
  window.clearCloudHistory = async () => {
    if (!currentUser || isGuest) return;
    if(!confirm("Are you sure you want to delete all chats permanently?")) return;
    showToast("Clearing Cloud Memory...", "#f59e0b");
    try {
        const msgRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'messages');
        const snap = await getDocs(msgRef);
        snap.forEach(d => { deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'messages', d.id)); });
        
        document.getElementById('chatArea').innerHTML = `<div class="hero-section" id="welcomeBlock"><h2>How can I help you?</h2></div>`;
        loadedMessageIds.clear(); isFirstLoad = true;
        showToast("Cloud Memory Wiped!", "#10b981");
    } catch(e) { showToast("Error clearing history", "#ef4444"); }
  };

  // Save specific message to Database
  async function saveToCloud(role, text) {
    if (!currentUser || isGuest) return;
    const msgRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'messages');
    try {
      const docRef = await addDoc(msgRef, { role: role, content: text, timestamp: Date.now() });
      loadedMessageIds.add(docRef.id); // Khud add kiya hai toh snapshot double load na kare
    } catch (e) { console.error(e); }
  }

  // Master Send Logic (Connects Python Backend & Firebase)
  window.triggerSend = async () => {
    const input = document.getElementById('chatInput'); 
    const q = input.value.trim(); 
    if(!q) return;

    document.getElementById('sendBtn').disabled = true; 
    input.value = ''; input.style.height = 'auto';
    const wb = document.getElementById('welcomeBlock'); if(wb) wb.remove();
    
    // Render and Save User Msg
    window.renderUIMessage('user', q);
    await saveToCloud('user', q);

    const tid = addTyping();
    
    try {
        const PYTHON_BACKEND_URL = "https://f6ba4873-9ca1-41f3-a2bf-821ce22f2cf0-00-26arcq4t9wfkj.sisko.replit.dev/api/chat"; 
        const payload = { question: q, is_online: navigator.onLine };
        const response = await fetch(PYTHON_BACKEND_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Server Failed");
        const data = await response.json();
        
        document.getElementById(tid).remove();
        
        // Render and Save AI Msg
        window.renderUIMessage('ai', data.answer);
        await saveToCloud('ai', data.answer);

    } catch(err) {
        document.getElementById(tid).remove();
        window.renderUIMessage('ai', "⚠️ Python Server se connection fail ho gaya.");
    }

    document.getElementById('sendBtn').disabled = false; 
    document.getElementById('chatInput').focus();
  }

  document.getElementById('chatInput').addEventListener('keydown', (e) => { 
    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.triggerSend(); } 
  });

</script>

</body>
</html>
